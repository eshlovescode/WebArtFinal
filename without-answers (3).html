<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>　</title>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Space+Mono:ital@1&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,600&family=Courier+Prime&family=Special+Elite&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;}
#shell{width:100%;height:100%;position:relative;}
.scene{position:absolute;inset:0;opacity:0;pointer-events:none;transition:opacity 1.6s ease;}
.scene.live{opacity:1;pointer-events:all;}

#next-circle{
  position:fixed;bottom:32px;right:32px;
  width:52px;height:52px;border-radius:50%;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  box-shadow:0 8px 32px rgba(0,0,0,0.7),0 0 0 1px rgba(255,255,255,0.03);
  cursor:pointer;z-index:9999;
  opacity:0;pointer-events:none;
  transition:opacity 2s,background 0.4s,box-shadow 0.4s;
}
#next-circle.show{opacity:1;pointer-events:all;}
#next-circle:hover{background:rgba(255,255,255,0.14);box-shadow:0 12px 44px rgba(0,0,0,0.8),0 0 28px rgba(255,255,255,0.07);}

/* ═══ PAGE 1 ═══ */
#s1{background:#080808;overflow:scroll;-ms-overflow-style:none;scrollbar-width:none;}
#s1::-webkit-scrollbar{display:none;}
#s1-field{position:relative;flex-shrink:0;}
.s1w{position:absolute;white-space:nowrap;user-select:none;}

/* ═══ PAGE 2 ═══ */
#s2{overflow:hidden;}
#s2-canvas{position:absolute;inset:0;width:100%;height:100%;}
#s2-pops{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.xpop{
  position:absolute;
  border:1.5px solid #2a1f0e;
  padding:14px 18px 12px;max-width:240px;
  pointer-events:all;
  animation:xin 0.13s ease-out both;
  font-family:'Courier Prime',monospace;
  font-size:11px;line-height:1.7;
}
@keyframes xin{from{transform:scale(0.4) rotate(-8deg);opacity:0;}to{transform:scale(1) rotate(var(--t,0deg));opacity:1;}}
.xpop-x{position:absolute;top:4px;right:7px;background:none;border:none;cursor:pointer;font-size:15px;opacity:0.4;font-family:'Courier Prime',monospace;}
.xpop-x:hover{opacity:1;}
#s2-flash{position:absolute;inset:0;opacity:0;pointer-events:none;z-index:80;background:#fff;}
#s2-garden{position:absolute;inset:0;opacity:0;pointer-events:none;transition:opacity 2.4s;z-index:50;}
#s2-garden.bloom{opacity:1;pointer-events:all;}
#s2-gc{position:absolute;inset:0;width:100%;height:100%;}
#s2-gnext{
  position:absolute;bottom:9%;right:7%;
  width:42px;height:42px;border-radius:50%;
  background:rgba(40,80,25,0.15);border:1px solid rgba(40,80,25,0.3);
  cursor:pointer;box-shadow:0 4px 18px rgba(0,0,0,0.2);
  transition:background 0.4s,box-shadow 0.4s;
}
#s2-gnext:hover{background:rgba(40,80,25,0.35);box-shadow:0 8px 30px rgba(0,0,0,0.3);}

/* ═══ PAGE 3 ═══ */
#s3{background:#000;overflow:hidden;cursor:none;}
#s3-canvas{position:absolute;inset:0;width:100%;height:100%;}
#s3-cur{position:absolute;width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.35);pointer-events:none;transform:translate(-50%,-50%);z-index:10;}
#s3-next-circle{
  position:fixed;bottom:32px;right:32px;
  width:44px;height:44px;border-radius:50%;
  background:rgba(180,120,255,0.06);border:1px solid rgba(180,120,255,0.15);
  box-shadow:0 6px 24px rgba(0,0,0,0.6);
  cursor:pointer;z-index:9999;
  opacity:0;pointer-events:none;
  transition:opacity 2s,background 0.4s;
}
#s3-next-circle.show{opacity:1;pointer-events:all;}
#s3-next-circle:hover{background:rgba(180,120,255,0.14);}

/* ═══ PAGE 4 ═══ */
#s4{background:#0a0a0a;overflow:hidden;cursor:none;}
#s4-canvas{position:absolute;inset:0;width:100%;height:100%;}
#s4-cur{
  position:absolute;width:44px;height:44px;border-radius:50%;
  border:1px solid rgba(255,255,255,0.35);
  pointer-events:none;transform:translate(-50%,-50%);z-index:10;
  transition:border-color 0.2s;
}
#s4-next-circle{
  position:fixed;bottom:32px;right:32px;
  width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);
  box-shadow:0 6px 22px rgba(0,0,0,0.5);
  cursor:pointer;z-index:9999;
  opacity:0;pointer-events:none;
  transition:opacity 2s,background 0.4s;
}
#s4-next-circle.show{opacity:1;pointer-events:all;}
#s4-next-circle:hover{background:rgba(255,255,255,0.12);}

/* ═══ PAGE 5 ═══ */
#s5 { overflow:hidden; background:#111; }
#s5-inner {
  position:absolute; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:0;
}
#s5-sky {
  position:absolute; inset:0;
  background:#111;
  transition:background 2.8s ease;
  z-index:0;
}
#s5-msg {
  position:relative; z-index:10;
  font-family:'Courier Prime',monospace;
  font-size:clamp(13px,2vw,18px);
  color:rgba(255,255,255,0.55);
  letter-spacing:3px;
  text-align:center;
  padding:0 40px;
  min-height:28px;
  pointer-events:none;
  transition:opacity 0.5s;
}
#s5-things {
  position:absolute; inset:0; z-index:5;
  pointer-events:none; overflow:hidden;
}
.s5-thing {
  position:absolute;
  font-size:clamp(20px,4vw,52px);
  animation:s5float linear forwards;
  pointer-events:none;
  user-select:none;
  will-change:transform;
}
@keyframes s5float {
  0%   { opacity:0;  transform:translateY(0) rotate(0deg)   scale(0.4); }
  8%   { opacity:1; }
  90%  { opacity:0.9; }
  100% { opacity:0;  transform:translateY(var(--dy)) rotate(var(--rot)) scale(var(--sc)); }
}
#s5-input-wrap {
  position:relative; z-index:20;
  margin-top:clamp(180px,28vh,320px);
}
#s5-input {
  background:none;
  border:none;
  border-bottom:1px solid rgba(255,255,255,0.2);
  outline:none;
  color:rgba(255,255,255,0.7);
  font-family:'Courier Prime',monospace;
  font-size:clamp(14px,2vw,20px);
  letter-spacing:4px;
  text-align:center;
  width:clamp(200px,40vw,480px);
  padding:8px 4px;
  caret-color:rgba(255,255,255,0.4);
}
#s5-input::placeholder { color:rgba(255,255,255,0.15); letter-spacing:3px; }
#s5-home-circle {
  position:fixed; bottom:32px; right:32px;
  width:48px; height:48px; border-radius:50%;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.12);
  box-shadow:0 8px 32px rgba(0,0,0,0.7);
  cursor:pointer; z-index:9999;
  opacity:0; pointer-events:none;
  transition:opacity 2.5s, background 0.4s;
}
#s5-home-circle.show { opacity:1; pointer-events:all; }
#s5-home-circle:hover { background:rgba(255,255,255,0.13); }
</style>
</head>
<body>
<div id="shell">

<div class="scene live" id="s1"><div id="s1-field"></div></div>

<div class="scene" id="s2">
  <canvas id="s2-canvas"></canvas>
  <div id="s2-pops"></div>
  <div id="s2-flash"></div>
  <div id="s2-garden">
    <canvas id="s2-gc"></canvas>
    <button id="s2-gnext" aria-label="continue"></button>
  </div>
</div>

<div class="scene" id="s3">
  <canvas id="s3-canvas"></canvas>
  <div id="s3-cur"></div>
  <button id="s3-next-circle" aria-label="next"></button>
</div>

<div class="scene" id="s4">
  <canvas id="s4-canvas"></canvas>
  <div id="s4-cur"></div>
  <button id="s4-next-circle" aria-label="next"></button>
</div>

<div class="scene" id="s5">
  <div id="s5-inner">
    <div id="s5-sky"></div>
    <div id="s5-msg"></div>
    <div id="s5-things"></div>
    <div id="s5-input-wrap">
      <input id="s5-input" type="text" autocomplete="off" spellcheck="false" placeholder="type anything">
    </div>
  </div>
  <button id="s5-home-circle" aria-label="back"></button>
</div></div>

<button id="next-circle" aria-label="next"></button>

</div>
<script>
// ── global timer ──
const TOTAL_MS = 9.5 * 60 * 1000;
setTimeout(()=>goTo(0), TOTAL_MS);

let cur = 0;
const IDS = ['s1','s2','s3','s4','s5'];

function goTo(i){
  document.getElementById(IDS[cur]).classList.remove('live');
  cur = i;
  document.getElementById(IDS[cur]).classList.add('live');
  document.getElementById('next-circle').classList.toggle('show', i===0);
  ['s3-next-circle','s4-next-circle'].forEach((id,j)=>{
    document.getElementById(id).classList.toggle('show', i===j+2);
  });
  if(i===1) s2boot();
  if(i===2) s3boot();
  if(i===3) s4boot();
  if(i===4) s5boot();
}

// ════════════════════════════════════════
// PAGE 1 — DISORIENTATION
// ════════════════════════════════════════
(function(){
  const WORDS = [
    "why do mirrors flip left and right",
    "but not up and down",
    "a runner moves at 10 m/s",
    "for half the distance of a race",
    "how fast do they have to run",
    "such that their average speed is 20 m/s",
    "the question of how such a device would turn",
    "was the subject of an intense",
    "remarkably long-lived debate",
    "the device generally remains steady",
    "you may pick one envelope",
    "and keep the money it contains",
    "having chosen an envelope at will",
    "you are given the chance to switch",
    "should you switch",
    "since the situation is symmetric",
    "it seems obvious that there is no point",
    "a simple calculation using expected values",
    "suggests the opposite conclusion",
    "it is always beneficial to swap",
    "the person stands to gain twice as much",
    "while the only risk is halving",
    "denote by A the amount in the selected envelope",
    "the probability that A is the smaller amount is 1/2",
    "the other envelope may contain either 2A or A/2",
    "½(2A) + ½(A/2) = 5/4 A",
    "since 5/4 A > A switching appears to increase",
    "any fairly reasonable man would sell his chance",
    "for twenty ducats",
    "few of us would pay even $25",
    "the apparent paradox is the discrepancy",
    "our brain is far less used to that sort of rotation",
    "they would have to move infinitely fast",
    "and immediately teleport to the end of the race",
    "if you had a lake or swimming pool",
    "and sucked the water in instead of squirting it out",
    "which way would it turn",
    "everybody knows which way it goes around",
    "it backs away from the outgoing water",
    "the expected value of the net change",
    "one should therefore play the game at any price",
    "although the standard calculation shows",
    "that the expectation is infinitely great",
    "mirrors",  "average",  "infinite",  "switch",
    "backwards","velocity", "rotation",  "envelope",
    "∞",        "½",        "A/2",       "2A",
    "20 m/s",   "10 m/s",   "zero",      "undefined",
  ];

  const field = document.getElementById('s1-field');
  const FONTS = [
    "'IM Fell English',serif",
    "'Courier Prime',monospace",
    "'Cormorant Garamond',serif",
    "'Special Elite',cursive",
  ];
  const SIZES = [8,9,10,11,12,14,16,18,22,26,32,38,46,56,68,84,100,120];

  // Size the field and scatter words in real px, start scrolled to center
  function initField(){
    const FW = window.innerWidth * 4.2;
    const FH = window.innerHeight * 4.2;
    field.style.width  = FW + 'px';
    field.style.height = FH + 'px';
    field.innerHTML = '';
    WORDS.forEach((w,i)=>{
      const el = document.createElement('div');
      el.className='s1w';
      const sz = SIZES[Math.floor(Math.random()*SIZES.length)];
      el.style.cssText=`
        font-family:${FONTS[i%FONTS.length]};
        font-size:${sz}px;
        font-style:${Math.random()>.5?'italic':'normal'};
        font-weight:${sz>40?300:400};
        color:rgba(255,255,255,${(0.03+Math.random()*0.52).toFixed(2)});
        left:${(Math.random()*FW*.94).toFixed(0)}px;
        top:${(Math.random()*FH*.94).toFixed(0)}px;
        transform:rotate(${((Math.random()-.5)*24).toFixed(1)}deg);
        letter-spacing:${((Math.random()*8)-2).toFixed(1)}px;
      `;
      el.textContent=w;
      field.appendChild(el);
    });
    // scroll to center so user can explore in all directions
    const s1el = document.getElementById('s1');
    s1el.scrollLeft = (FW - window.innerWidth)  / 2;
    s1el.scrollTop  = (FH - window.innerHeight) / 2;
  }
  initField();
  window.addEventListener('resize', initField);

  // Reveal circle after 9s
  setTimeout(()=>{ document.getElementById('next-circle').classList.add('show'); }, 9000);
  document.getElementById('next-circle').addEventListener('click',()=>goTo(1));
})();

// ════════════════════════════════════════
// PAGE 2 — RUNNER
// ════════════════════════════════════════
let s2ready=false, s2st={};
const BGCOLS=['#f0ebe0','#e8e0d0','#dde8e0','#e0dde8','#e8ddd8','#d8e4ec','#ece8d8','#e8e4d0'];
const POPS=[
  "t = d/10\nt_used = d/20\nt_left = 0",
  "v₂ = (d/2) / 0\n= ?",
  "the time\nis already\ngone",
  "½ × 20 = 10\nbut 10 ≠ 10",
  "try dividing\nby zero",
  "no.\n\nno no no no\n\nno.",
  "how fast is\ninstantaneous?",
  "∞\n\nthat's the answer",
  "you used all the time\nat half the speed",
  "running faster\ndoesn't help\nyou're already late",
  "t_remaining\n= 0.000…\n= 0",
  "average ≠\naverage of speeds",
  "it is not 30\nit is not 40\nnot anything",
  "d / (d/10 - d/20)\n= d / 0\n= undefined",
  "the race\nis\nover",
  "you're still running\nbut the clock stopped",
  "only one answer exists",
  "close one more",
  "just one more",
  "ok.\nlet go.",
  "10 m/s × time = d/2\ntime = d/20\nremaining = 0",
  "√(impossible²) = impossible",
  "lim v→∞ (d/2)/v = 0\nbut we need 0 exactly",
  "sorry",
];

function s2boot(){
  if(s2ready) return; s2ready=true;
  const cv=document.getElementById('s2-canvas');
  const ctx=cv.getContext('2d');
  let W,H;
  function rsz(){W=cv.width=cv.offsetWidth;H=cv.height=cv.offsetHeight;}
  rsz(); window.addEventListener('resize',rsz);

  s2st={phase:0,x:80,leg:0,boost:0,halfDone:false,
    pIdx:0,pCleared:0,pTimer:null,
    bgCur:'#f0ebe0',bgTgt:'#f0ebe0',bgLerp:0,
    rain:[],raining:false,started:false};

  document.addEventListener('keydown',e=>{
    if(cur!==1||e.code!=='Space') return;
    e.preventDefault();
    if(!s2st.started){s2st.started=true;s2st.phase=1;}
    s2st.boost=6;
  });
  cv.addEventListener('touchstart',()=>{
    if(cur!==1) return;
    if(!s2st.started){s2st.started=true;s2st.phase=1;}
    s2st.boost=6;
  },{passive:true});

  function makeRain(){
    for(let i=0;i<160;i++) s2st.rain.push({
      x:Math.random()*W, y:Math.random()*H*.7,
      l:9+Math.random()*20, v:7+Math.random()*9,
      a:.1+Math.random()*.3
    });
    s2st.raining=true;
  }

  function spawnPop(){
    if(s2st.pIdx>=POPS.length) return;
    const txt=POPS[s2st.pIdx++];
    const el=document.createElement('div');
    el.className='xpop';
    const tilt=(Math.random()-.5)*12;
    el.style.cssText+=`--t:${tilt}deg;`;
    el.style.transform=`rotate(${tilt}deg)`;
    el.style.left=(8+Math.random()*(W-260))+'px';
    el.style.top=(8+Math.random()*(H-160))+'px';
    el.style.background=s2st.bgCur;
    el.style.color='#2a1f0e';
    el.style.zIndex=30;
    el.innerHTML=`<button class="xpop-x" onclick="s2xClose(this)">×</button><div style="white-space:pre-wrap">${txt}</div>`;
    document.getElementById('s2-pops').appendChild(el);
  }

  window.s2xClose=function(btn){
    const p=btn.closest('.xpop');
    p.style.cssText+='transition:opacity .1s,transform .1s;opacity:0;transform:'+p.style.transform+' scale(0.3);';
    setTimeout(()=>p.remove(),120);
    s2st.pCleared++;
    if(s2st.pCleared>=20&&s2st.phase===2){
      clearInterval(s2st.pTimer);
      document.querySelectorAll('.xpop').forEach(p=>p.remove());
      s2st.phase=3;
      s2teleport();
    }
  };

  function s2teleport(){
    const fl=document.getElementById('s2-flash');
    let n=0;
    const iv=setInterval(()=>{
      fl.style.opacity=n%2===0?'1':'0'; n++;
      if(n>14){clearInterval(iv);fl.style.opacity='0';s2garden();}
    },75);
  }

  function s2garden(){
    s2st.phase=4;
    const g=document.getElementById('s2-garden');
    g.classList.add('bloom');
    const gc=document.getElementById('s2-gc');
    gc.width=gc.offsetWidth; gc.height=gc.offsetHeight;
    const c=gc.getContext('2d'),GW=gc.width,GH=gc.height;
    // sky
    const sk=c.createLinearGradient(0,0,0,GH*.65);
    sk.addColorStop(0,'#c2eaf6');sk.addColorStop(1,'#d4f0e0');
    c.fillStyle=sk;c.fillRect(0,0,GW,GH);
    c.fillStyle='#4e9040';c.fillRect(0,GH*.65,GW,GH);
    c.fillStyle='#ffe058';c.beginPath();c.arc(GW*.82,GH*.14,46,0,Math.PI*2);c.fill();
    const fc=['#ff6b9d','#ff4040','#ffd700','#ff8c00','#9b59b6','#00bcd4','#e91e63','#f0f','#0ff','#ff6600'];
    for(let i=0;i<50;i++){
      const fx=18+Math.random()*(GW-36);
      const fy=GH*.58+Math.random()*GH*.36;
      const col=fc[i%fc.length];
      c.strokeStyle='#2e6820';c.lineWidth=1.6;
      c.beginPath();c.moveTo(fx,fy);c.lineTo(fx,fy-35);c.stroke();
      for(let p=0;p<6;p++){
        const a=(p/6)*Math.PI*2;
        c.fillStyle=col;c.beginPath();
        c.ellipse(fx+Math.cos(a)*8,fy-35+Math.sin(a)*8,6.5,3.5,a,0,Math.PI*2);c.fill();
      }
      c.fillStyle='#ffe050';c.beginPath();c.arc(fx,fy-35,4.5,0,Math.PI*2);c.fill();
    }
    // Stick figure — jarring position: top-left, floating above ground
    const sx=GW*.07,sy=GH*.22;
    c.strokeStyle='#1a1208';c.lineWidth=2.5;c.lineCap='round';
    c.beginPath();c.arc(sx,sy-50,10,0,Math.PI*2);c.stroke();
    c.beginPath();c.moveTo(sx,sy-40);c.lineTo(sx,sy-14);c.stroke();
    c.beginPath();c.moveTo(sx-14,sy-30);c.lineTo(sx+14,sy-30);c.stroke();
    c.beginPath();c.moveTo(sx,sy-14);c.lineTo(sx-10,sy+2);c.stroke();
    c.beginPath();c.moveTo(sx,sy-14);c.lineTo(sx+10,sy+2);c.stroke();
    document.getElementById('s2-gnext').onclick=()=>goTo(2);
  }

  function hexLerp(a,b,t){
    const ah=parseInt(a.slice(1),16),bh=parseInt(b.slice(1),16);
    const ar=(ah>>16)&255,ag=(ah>>8)&255,ab=ah&255;
    const br=(bh>>16)&255,bg=(bh>>8)&255,bb=bh&255;
    return '#'+[Math.round(ar+(br-ar)*t),Math.round(ag+(bg-ag)*t),Math.round(ab+(bb-ab)*t)]
      .map(v=>v.toString(16).padStart(2,'0')).join('');
  }

  function paper(ctx,W,H,col){
    ctx.fillStyle=col;ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='rgba(120,100,70,.07)';ctx.lineWidth=.5;
    for(let y=0;y<H;y+=30){
      ctx.beginPath();
      ctx.moveTo(0,y+Math.sin(y*.05)*3);
      ctx.bezierCurveTo(W*.4,y+Math.sin(y*.04)*5,W*.7,y-Math.sin(y*.06)*4,W,y+Math.sin(y*.05)*2);
      ctx.stroke();
    }
  }

  function stick(ctx,x,gy,leg,phase){
    ctx.strokeStyle='#2a1f0e';ctx.lineWidth=2.2;ctx.lineCap='round';
    ctx.beginPath();ctx.arc(x,gy-42,9,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x,gy-33);ctx.lineTo(x,gy-14);ctx.stroke();
    if(phase>0){
      ctx.beginPath();ctx.moveTo(x,gy-28);ctx.lineTo(x+Math.sin(leg*1.1)*16,gy-22+Math.cos(leg)*4);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x,gy-28);ctx.lineTo(x-Math.sin(leg*1.1)*16,gy-22-Math.cos(leg)*4);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x,gy-14);ctx.lineTo(x+Math.sin(leg)*18,gy+2);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x,gy-14);ctx.lineTo(x-Math.sin(leg)*18,gy+2);ctx.stroke();
    } else {
      ctx.beginPath();ctx.moveTo(x-12,gy-27);ctx.lineTo(x+12,gy-27);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x,gy-14);ctx.lineTo(x-8,gy+2);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x,gy-14);ctx.lineTo(x+8,gy+2);ctx.stroke();
    }
  }

  (function loop(){
    requestAnimationFrame(loop);
    if(cur!==1||s2st.phase>=4) return;
    if(s2st.phase>=1){
      s2st.bgLerp+=.007;
      if(s2st.bgLerp>=1){s2st.bgLerp=0;s2st.bgCur=s2st.bgTgt;s2st.bgTgt=BGCOLS[Math.floor(Math.random()*BGCOLS.length)];}
    }
    const col=s2st.phase>=1?hexLerp(s2st.bgCur,s2st.bgTgt,s2st.bgLerp):'#f0ebe0';
    paper(ctx,W,H,col);
    const gy=H*.7;
    ctx.strokeStyle='rgba(42,31,14,.22)';ctx.lineWidth=1;ctx.setLineDash([6,5]);
    ctx.beginPath();ctx.moveTo(60,gy);ctx.lineTo(W-60,gy);ctx.stroke();
    ctx.setLineDash([]);
    if(s2st.raining){
      ctx.strokeStyle='rgba(90,130,175,.35)';ctx.lineWidth=.7;
      s2st.rain.forEach(r=>{
        ctx.globalAlpha=r.a;
        ctx.beginPath();ctx.moveTo(r.x,r.y);ctx.lineTo(r.x+r.l*.14,r.y+r.l);ctx.stroke();
        r.y+=r.v;r.x+=r.v*.1;
        if(r.y>H){r.y=-20;r.x=Math.random()*W;}
      });
      ctx.globalAlpha=1;
    }
    if(s2st.phase===0){
      ctx.font="11px 'Courier Prime',monospace";ctx.fillStyle='rgba(42,31,14,.18)';ctx.textAlign='center';
      ctx.fillText('spacebar',W/2,gy-18);
    }
    if(s2st.phase===1){
      if(s2st.boost>0){s2st.x+=2.5;s2st.boost-=.14;} else s2st.x+=.26;
      s2st.leg+=s2st.boost>1?.25:.07;
      if(s2st.x>=W*.5&&!s2st.halfDone){
        s2st.halfDone=true;s2st.phase=2;s2st.bgTgt=BGCOLS[1];
        makeRain();
        let pc=0;s2st.pTimer=setInterval(()=>{spawnPop();pc++;if(pc>=POPS.length)clearInterval(s2st.pTimer);},260);
      }
    } else if(s2st.phase===2){s2st.x+=.05;s2st.leg+=.015;}
    if(s2st.phase<=2) stick(ctx,s2st.x,gy,s2st.leg,s2st.phase);
  })();
}

// ════════════════════════════════════════
// PAGE 3 — MANDALA
// ════════════════════════════════════════
let s3ready=false;
function s3boot(){
  if(s3ready) return; s3ready=true;
  const cv=document.getElementById('s3-canvas');
  const ctx=cv.getContext('2d');
  const cr=document.getElementById('s3-cur');
  let W,H,CX,CY;
  function rsz(){W=cv.width=cv.offsetWidth;H=cv.height=cv.offsetHeight;CX=W/2;CY=H/2;}
  rsz(); window.addEventListener('resize',rsz);
  let mx=0,my=0;
  cv.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cr.style.left=mx+'px';cr.style.top=my+'px';});
  cv.addEventListener('touchmove',e=>{mx=e.touches[0].clientX;my=e.touches[0].clientY;},{passive:true});

  const LAYERS=[
    {n:8, r:.13, ps:.048, col:[180,120,255], spd:.0035, ph:0},
    {n:12,r:.24, ps:.038, col:[120,180,255], spd:-.0024,ph:.6},
    {n:16,r:.35, ps:.030, col:[255,160,120], spd:.002,  ph:1.2},
    {n:6, r:.44, ps:.058, col:[120,255,200], spd:-.0017,ph:1.8},
    {n:24,r:.53, ps:.022, col:[255,220,100], spd:.0013, ph:2.4},
    {n:8, r:.62, ps:.065, col:[200,120,255], spd:-.001, ph:.4},
    {n:20,r:.70, ps:.018, col:[100,220,255], spd:.0008, ph:3.1},
    {n:10,r:.78, ps:.042, col:[255,180,200], spd:-.0006,ph:1.6},
  ];

  let gA=0, zoom=1, tzoom=1, ex=0,ey=0;
  cv.addEventListener('wheel',e=>{e.preventDefault();tzoom=Math.min(5,Math.max(.5,tzoom-e.deltaY*.001));},{passive:false});

  function petal(ctx,angle,r,sz,col,a){
    ctx.save();ctx.rotate(angle);ctx.translate(r,0);
    ctx.fillStyle=`rgba(${col},${a})`;
    ctx.beginPath();ctx.ellipse(0,0,sz,sz*.36,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=`rgba(${col},${Math.min(1,a*1.6)})`;
    ctx.beginPath();ctx.ellipse(0,0,sz*.42,sz*.13,0,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  let s3nextShown=false;
  document.getElementById('s3-next-circle').addEventListener('click',()=>goTo(3));

  (function loop(){
    requestAnimationFrame(loop);
    if(cur!==2) return;
    gA+=.010; zoom+=(tzoom-zoom)*.035;
    if(zoom>1.3){ex+=(mx-CX-ex)*.025;ey+=(my-CY-ey)*.025;}
    else{ex*=.95;ey*=.95;}
    ctx.fillStyle='rgba(0,0,0,.13)';ctx.fillRect(0,0,W,H);
    const R=Math.min(W,H)*.42;
    ctx.save();ctx.translate(CX,CY);ctx.scale(zoom,zoom);ctx.translate(ex/zoom,ey/zoom);
    // Core
    const pulse=.65+.35*Math.sin(gA*2.2);
    ctx.fillStyle=`rgba(220,180,255,${.25*pulse})`;
    ctx.beginPath();ctx.arc(0,0,12*pulse,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=`rgba(200,160,255,${.45*pulse})`;ctx.lineWidth=.8;
    ctx.beginPath();ctx.arc(0,0,17*pulse,0,Math.PI*2);ctx.stroke();
    LAYERS.forEach((L,li)=>{
      const angle=gA*L.spd*400+L.ph;
      const radius=R*L.r;
      const ps=R*L.ps;
      const alpha=.12+.22*(1-li/LAYERS.length);
      const col=L.col.join(',');
      // Ring
      ctx.strokeStyle=`rgba(${col},${alpha*.45})`;ctx.lineWidth=.4;
      ctx.beginPath();ctx.arc(0,0,radius,0,Math.PI*2);ctx.stroke();
      // Petals
      for(let n=0;n<L.n;n++) petal(ctx,angle+(n/L.n)*Math.PI*2,radius,ps,col,alpha);
      // Dots at tips
      for(let n=0;n<L.n;n++){
        const a=angle+(n/L.n)*Math.PI*2;
        ctx.save();ctx.rotate(a);ctx.translate(radius+ps,0);
        ctx.fillStyle=`rgba(${col},${alpha*1.8})`;
        ctx.beginPath();ctx.arc(0,0,2.2,0,Math.PI*2);ctx.fill();
        ctx.restore();
      }
      // Inner polygon
      if(li%3===0){
        ctx.save();ctx.rotate(angle*.28);
        ctx.strokeStyle=`rgba(${col},${alpha*.7})`;ctx.lineWidth=.5;
        ctx.beginPath();
        for(let n=0;n<=L.n;n++){const a=(n/L.n)*Math.PI*2;const rr=radius*.86;if(n===0)ctx.moveTo(Math.cos(a)*rr,Math.sin(a)*rr);else ctx.lineTo(Math.cos(a)*rr,Math.sin(a)*rr);}
        ctx.closePath();ctx.stroke();
        ctx.restore();
      }
      // Spokes
      if(li%2===0){
        ctx.strokeStyle=`rgba(${col},${alpha*.3})`;ctx.lineWidth=.35;
        const inner=li>0?R*LAYERS[li-1].r:8;
        for(let n=0;n<L.n;n++){
          const a=angle+(n/L.n)*Math.PI*2;
          ctx.save();ctx.rotate(a);ctx.beginPath();ctx.moveTo(inner,0);ctx.lineTo(radius,0);ctx.stroke();ctx.restore();
        }
      }
    });
    ctx.restore();
    // Auto-next after 45s on this page
    if(!s3nextShown&&gA>45*.010){
      s3nextShown=true;
      document.getElementById('s3-next-circle').classList.add('show');
    }
  })();
}

// ════════════════════════════════════════
// PAGE 4 — SCATTERED SHAPES (p5-style)
// ════════════════════════════════════════
let s4ready=false;
const EQS=[
  "E[X] = Σ xᵢ · P(xᵢ)",
  "½(2A) + ½(A/2) = 5A/4",
  "lim Σ 2ⁿ·(½ⁿ) = ∞",
  "v̄ = 2d / (d/v₁ + d/v₂)",
  "v₂ = ∞",
  "τ = r × F",
  "L = Iω",
  "∮ F·dr = 0",
  "E[Y|X] = (5/4)x",
  "P(A>B) = ½",
  "∞ − ∞ = ?",
  "U(x) = log x",
  "d(Iω)/dt = τ",
  "∫₀^∞ xe^{−x}dx = 1",
  "Σ k/2^k = 2",
  "∇ × F = 0",
  "Var(X) = E[X²]−(E[X])²",
  "lim 1/x = ±∞",
  "P(Ω) = 1",
  "F = ma",
  "S = k ln Ω",
  "A/2",
  "2A",
  "5/4",
  "½",
  "∞",
  "?",
  "=",
  "≠",
  "≈",
];

function s4boot(){
  if(s4ready) return; s4ready=true;
  const cv = document.getElementById('s4-canvas');
  const ctx = cv.getContext('2d');
  const curEl = document.getElementById('s4-cur');
  let W, H;

  const MOUSE_THRESHOLD = 90;
  const MOVE_DIST       = 160;
  const ANIM_DIST       = 30;
  const FONTS = [
    "italic 13px 'Cormorant Garamond',serif",
    "12px 'Courier Prime',monospace",
    "italic 15px 'IM Fell English',serif",
    "11px 'Space Mono',monospace",
  ];

  let shapes = [];

  function initShapes(){
    shapes = [];
    const N = 420;
    for(let i = 0; i < N; i++){
      const txt = EQS[Math.floor(Math.random() * EQS.length)];
      const r = 80 + Math.random() * 120; // hue
      const g = 60 + Math.random() * 100;
      const b = 160 + Math.random() * 95;
      shapes.push({
        x:  Math.random() * W,
        y:  Math.random() * H,
        tx: 0, ty: 0,           // drift target offsets
        txt,
        font: FONTS[Math.floor(Math.random() * FONTS.length)],
        alpha: 0.08 + Math.random() * 0.55,
        r, g, b,
        size: 9 + Math.random() * 16,
      });
    }
  }

  let mx = -999, my = -999;
  document.getElementById('s4').addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    curEl.style.left = mx + 'px';
    curEl.style.top  = my + 'px';
  });

  function rsz(){
    W = cv.width  = cv.offsetWidth;
    H = cv.height = cv.offsetHeight;
    initShapes();
  }
  rsz(); window.addEventListener('resize', rsz);

  let t = 0, s4nextShown = false;
  document.getElementById('s4-next-circle').addEventListener('click', () => goTo(4));

  function lerp(a, b, t){ return a + (b - a) * t; }
  function rand(lo, hi){ return lo + Math.random() * (hi - lo); }

  (function loop(){
    requestAnimationFrame(loop);
    if(cur !== 3) return;
    t++;

    ctx.fillStyle = 'rgba(10,10,10,0.28)';
    ctx.fillRect(0, 0, W, H);

    shapes.forEach(s => {
      // distance from mouse
      const dx = mx - s.x;
      const dy = my - s.y;
      const dist = Math.sqrt(dx*dx + dy*dy);

      if(dist <= MOUSE_THRESHOLD){
        // scatter — jump to new random position away from mouse
        s.x += rand(-MOVE_DIST, MOVE_DIST);
        s.y += rand(-MOVE_DIST, MOVE_DIST);
        // clamp to canvas
        s.x = Math.max(0, Math.min(W, s.x));
        s.y = Math.max(0, Math.min(H, s.y));
      }

      // slow organic drift (animateShape equivalent)
      s.x = lerp(s.x, s.x + rand(-ANIM_DIST, ANIM_DIST), 0.008);
      s.y = lerp(s.y, s.y + rand(-ANIM_DIST, ANIM_DIST), 0.008);
      // keep in bounds
      if(s.x < -60)  s.x = W + 40;
      if(s.x > W+60) s.x = -40;
      if(s.y < -20)  s.y = H + 10;
      if(s.y > H+20) s.y = -10;

      // draw
      ctx.globalAlpha = s.alpha;
      ctx.fillStyle = `rgb(${Math.round(s.r)},${Math.round(s.g)},${Math.round(s.b)})`;
      ctx.font = s.font;
      ctx.fillText(s.txt, s.x, s.y);
    });

    ctx.globalAlpha = 1;

    // cursor circle on canvas too (subtle glow)
    if(mx > 0){
      ctx.beginPath();
      ctx.arc(mx, my, MOUSE_THRESHOLD, 0, Math.PI*2);
      ctx.strokeStyle = 'rgba(255,255,255,0.04)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    if(!s4nextShown && t > 25*60){
      s4nextShown = true;
      document.getElementById('s4-next-circle').classList.add('show');
    }
  })();
}

// PAGE 5 — TYPE ANYTHING
// ════════════════════════════════════════
let s5ready = false;
function s5boot(){
  if(s5ready) return; s5ready = true;

  document.getElementById('s5-home-circle').addEventListener('click', ()=>goTo(0));
  setTimeout(()=> document.getElementById('s5-home-circle').classList.add('show'), 5000);

  const sky    = document.getElementById('s5-sky');
  const msg    = document.getElementById('s5-msg');
  const things = document.getElementById('s5-things');
  const input  = document.getElementById('s5-input');

  const SKIES = [
    '#111','#0a0020','#001a0a','#1a0000','#00101a',
    '#1a1000','#0d0d1a','#0a1a10','#1a0a00','#000000',
    '#080010','#100800','#001010','#100010',
  ];

  const EMOJI_POOLS = [
    ['🌊','🌊','💧','🐟','🐠','🦈','🐙','🦑','🌊'],
    ['🌵','🌴','🌿','🍃','🌱','🍀','🌾','🌳','🌲'],
    ['🔥','💥','✨','⚡','🌟','💫','🌈','☄️','🎆'],
    ['🍕','🍔','🌮','🍜','🍦','🍩','🎂','🧁','🍭'],
    ['🐶','🐱','🐸','🐧','🦊','🦁','🐻','🐼','🐨'],
    ['🚀','🛸','🌙','⭐','🪐','🌍','🌌','🔭','🛰️'],
    ['💀','👻','🕷️','🦇','🕸️','🌑','🖤','⚰️','🔮'],
    ['🎸','🎹','🥁','🎺','🎻','🎷','🎵','🎶','🎤'],
    ['❤️','💛','💚','💙','💜','🧡','🖤','🤍','💖'],
    ['🌸','🌺','🌻','🌹','💐','🌷','🌼','🏵️','🌞'],
  ];

  const MESSAGES = [
    'keep going',
    'almost',
    'interesting choice',
    'yes',
    'no',
    'are you sure',
    'again',
    'ok',
    'noted',
    '...',
    'something is happening',
    'nothing is happening',
    'both',
    'neither',
    'what did you mean by that',
    'sure',
    'why not',
    'exactly',
  ];

  let skyIdx   = 0;
  let emojiIdx = 0;
  let msgIdx   = 0;
  let keyCount = 0;
  let burst    = 0;

  function nextSky(){
    skyIdx = (skyIdx + 1) % SKIES.length;
    sky.style.background = SKIES[skyIdx];
  }

  function showMsg(){
    msg.style.opacity = '0';
    setTimeout(()=>{
      msg.textContent = MESSAGES[msgIdx % MESSAGES.length];
      msgIdx++;
      msg.style.opacity = '1';
    }, 300);
  }

  function spawnThing(emoji){
    const el  = document.createElement('div');
    el.className = 's5-thing';
    el.textContent = emoji;

    const W = window.innerWidth, H = window.innerHeight;
    const x = 5 + Math.random() * 90; // % of width
    const startY = 20 + Math.random() * 60; // % start
    el.style.left = x + '%';
    el.style.top  = startY + '%';

    const dy   = -(100 + Math.random() * 300);
    const rot  = (Math.random() - 0.5) * 720;
    const sc   = 0.3 + Math.random() * 2.2;
    const dur  = 1.8 + Math.random() * 3.2;

    el.style.setProperty('--dy',  dy  + 'px');
    el.style.setProperty('--rot', rot + 'deg');
    el.style.setProperty('--sc',  sc);
    el.style.animationDuration = dur + 's';

    things.appendChild(el);
    el.addEventListener('animationend', ()=> el.remove());
  }

  function onKey(e){
    if(cur !== 4) return;
    const pool = EMOJI_POOLS[emojiIdx % EMOJI_POOLS.length];

    // spawn 1-3 emojis
    const n = burst > 20 ? 3 : 1;
    for(let i = 0; i < n; i++){
      const emoji = pool[Math.floor(Math.random() * pool.length)];
      setTimeout(()=> spawnThing(emoji), i * 80);
    }

    keyCount++;
    burst++;

    // message every 8 keys
    if(keyCount % 8 === 0) showMsg();

    // sky shift every 15 keys
    if(keyCount % 15 === 0) nextSky();

    // emoji pool shift every 22 keys
    if(keyCount % 22 === 0){
      emojiIdx++;
      burst = 0;
    }
  }

  input.addEventListener('input', onKey);
  input.addEventListener('keydown', e => {
    if(e.key === 'Enter'){
      // clear and do a big burst
      const pool = EMOJI_POOLS[emojiIdx % EMOJI_POOLS.length];
      for(let i = 0; i < 18; i++){
        setTimeout(()=>{
          spawnThing(pool[Math.floor(Math.random()*pool.length)]);
        }, i * 60);
      }
      nextSky();
      showMsg();
      input.value = '';
    }
    if(e.key === 'Backspace' && input.value.length === 0){
      // going back makes things fall down instead of up
      const pool = EMOJI_POOLS[emojiIdx % EMOJI_POOLS.length];
      const el   = document.createElement('div');
      el.className = 's5-thing';
      el.textContent = pool[Math.floor(Math.random()*pool.length)];
      el.style.left = (10 + Math.random()*80) + '%';
      el.style.top  = '10%';
      el.style.setProperty('--dy',  (200 + Math.random()*400) + 'px');
      el.style.setProperty('--rot', (Math.random()-0.5)*360 + 'deg');
      el.style.setProperty('--sc',  0.5 + Math.random()*1.5);
      el.style.animationDuration = (2 + Math.random()*2) + 's';
      things.appendChild(el);
      el.addEventListener('animationend', ()=> el.remove());
    }
  });

  // focus input when page is active
  document.getElementById('s5').addEventListener('click', ()=> input.focus());
  setTimeout(()=> { if(cur===4) input.focus(); }, 400);

  // first message
  showMsg();
}

</script>
